name: Build and Release IPA

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Stub IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build unsigned IPA
        run: |
          chmod +x scripts/build_ipa.sh
          ./scripts/build_ipa.sh

      - name: Verify IPA
        run: |
          test -f dist/Stub.ipa
          unzip -p dist/Stub.ipa Payload/Stub.app/Info.plist > /tmp/Stub-Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" /tmp/Stub-Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" /tmp/Stub-Info.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stub-ipa
          path: dist/Stub.ipa
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/Stub.ipa
          generate_release_notes: true
